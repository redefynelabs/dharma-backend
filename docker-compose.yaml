services:
  # ─── ChromaDB Vector Store ───────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: dharma-chromadb
    # No host port — only reachable within the Docker network
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ['CMD', 'bash', '-c', 'exec 3<>/dev/tcp/localhost/8000 && printf "GET /api/v2/heartbeat HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3 && grep -q "200" <&3']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Node.js API ──────────────────────────────────────
  app:
    build:
      context: .page
      target: production
    container_name: dharma-app
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - CHROMA_HOST=chromadb   # Override .env — use Docker service name
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local